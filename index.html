<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Dynamic Roulette</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --accent-color: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #0f172a; }

        /* ルーレット外枠 */
        .roulette-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 30px;
        }

        /* 針（インジケーター） */
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--accent-color);
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* 操作エリア */
        .controls {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px; /* iOSの自動ズーム防止 */
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .add-btn { background-color: var(--primary-color); color: white; }
        .spin-btn { 
            width: 100%; 
            background-color: #0f172a; 
            color: white; 
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* 項目リスト */
        .item-list {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .item-tag {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .delete-tag { color: var(--accent-color); font-weight: bold; cursor: pointer; }

        /* 結果表示 */
        #result-display {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            height: 2rem;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <h1>Roulette Dashboard</h1>

    <div class="roulette-container">
        <div class="arrow"></div>
        <canvas id="rouletteCanvas" width="600" height="600"></canvas>
    </div>

    <div id="result-display"></div>

    <div class="controls">
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="項目を入力...">
            <button class="add-btn" onclick="addItem()">追加</button>
        </div>

        <div class="item-list" id="itemList"></div>

        <button class="spin-btn" id="spinButton" onclick="spin()">SPIN</button>
    </div>

    <script>
        let items = ["ランチ", "カフェ", "ラーメン", "定食"];
        const colors = ["#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899", "#06b6d4"];
        let currentRotation = 0;
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');

        function drawWheel() {
            const numItems = items.length;
            const arcSize = (2 * Math.PI) / numItems;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            items.forEach((item, i) => {
                const angle = i * arcSize;
                
                // セグメント描画
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(300, 300);
                ctx.arc(300, 300, 300, angle, angle + arcSize);
                ctx.fill();
                ctx.stroke();

                // テキスト描画
                ctx.save();
                ctx.translate(300, 300);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 30px Inter";
                ctx.fillText(item, 280, 10);
                ctx.restore();
            });
        }

        function addItem() {
            const input = document.getElementById('itemInput');
            if (input.value.trim() !== "") {
                items.push(input.value.trim());
                input.value = "";
                updateUI();
            }
        }

        function deleteItem(index) {
            if (items.length > 2) {
                items.splice(index, 1);
                updateUI();
            } else {
                alert("項目は最低2つ必要です。");
            }
        }

        function updateUI() {
            const list = document.getElementById('itemList');
            list.innerHTML = "";
            items.forEach((item, i) => {
                list.innerHTML += `<span class="item-tag">${item} <span class="delete-tag" onclick="deleteItem(${i})">×</span></span>`;
            });
            drawWheel();
        }

        function spin() {
            const btn = document.getElementById('spinButton');
            const display = document.getElementById('result-display');
            btn.disabled = true;
            display.innerText = "抽選中...";

            const extraSpins = 5 + Math.random() * 5; // 5〜10回転
            const spinAngle = extraSpins * 2 * Math.PI;
            currentRotation += spinAngle;

            canvas.style.transform = `rotate(${currentRotation}rad)`;

            setTimeout(() => {
                btn.disabled = false;
                
                // 当選判定
                const actualRotation = currentRotation % (2 * Math.PI);
                const arcSize = (2 * Math.PI) / items.length;
                
                // 針が真上(1.5PI)にあるため、計算を調整
                let winningIndex = items.length - Math.floor((actualRotation + (Math.PI * 1.5)) % (2 * Math.PI) / arcSize) - 1;
                if (winningIndex < 0) winningIndex += items.length;
                if (winningIndex >= items.length) winningIndex -= items.length;

                display.innerText = `結果: ${items[winningIndex]} 🎉`;
            }, 4000);
        }

        // 初期描画
        updateUI();
    </script>
</body>
</html>
