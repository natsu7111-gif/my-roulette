<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Cyber Roulette</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #090d16;
            --panel-bg: #131a2e;
            --neon-cyan: #00f2fe;
            --neon-pink: #fe019a;
            --neon-orange: #ff7300;
            --text-main: #f1f5f9;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        /* ルーレット外枠と光の輪 */
        .roulette-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 25px;
            border-radius: 50%;
            padding: 5px;
            background: rgba(255,255,255,0.03);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* スピン中に激しく光るエフェクト */
        .roulette-container.spinning::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-orange));
            border-radius: 50%;
            z-index: -1;
            animation: neonGlitch 0.5s linear infinite;
            filter: blur(8px);
        }

        /* センターピン（針） */
        .arrow {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 28px solid var(--neon-pink);
            filter: drop-shadow(0 0 8px var(--neon-pink));
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
            display: block;
        }

        /* 結果表示エリア */
        #result-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: bold;
            height: 3rem;
            text-align: center;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .winner-text {
            color: #fff;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            animation: pulse 1s infinite alternate;
        }

        /* コントロールパネル */
        .controls {
            width: 100%;
            max-width: 360px;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px;
            background: #090d16;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 16px;
            color: #fff;
            outline: none;
            transition: border 0.3s;
        }
        input[type="text"]:focus {
            border-color: var(--neon-cyan);
        }

        button {
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-btn {
            padding: 0 20px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--neon-cyan), #0072ff);
            color: white;
            font-size: 0.95rem;
        }

        /* ゲーミングSPINボタン */
        .spin-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16
        }

        /* 針（インジケーター） */
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--accent-color);
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* 操作エリア */
        .controls {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .add-btn { background-color: var(--primary-color); color: white; }
        .spin-btn { 
            width: 100%; 
            background-color: #0f172a; 
            color: white; 
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* 項目リスト */
        .item-list {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .item-tag {
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .delete-tag { color: var(--accent-color); font-weight: bold; cursor: pointer; }

        /* 結果表示 */
        #result-display {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            height: 2rem;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <h1>Roulette Dashboard</h1>

    <div class="roulette-container">
        <div class="arrow"></div>
        <canvas id="rouletteCanvas" width="600" height="600"></canvas>
    </div>

    <div id="result-display"></div>

    <div class="controls">
        <div class="input-group">
            <input type="text" id="itemInput" placeholder="項目を入力...">
            <button class="add-btn" onclick="addItem()">追加</button>
        </div>

        <div class="item-list" id="itemList"></div>

        <button class="spin-btn" id="spinButton" onclick="spin()">SPIN</button>
    </div>

    <script>
        let items = ["ランチ", "カフェ", "ラーメン", "定食"];
        const colors = ["#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899", "#06b6d4"];
        let currentRotation = 0;
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');

        function drawWheel() {
            const numItems = items.length;
            const arcSize = (2 * Math.PI) / numItems;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            items.forEach((item, i) => {
                const angle = i * arcSize;
                
                // セグメント描画
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(300, 300);
                ctx.arc(300, 300, 300, angle, angle + arcSize);
                ctx.fill();
                ctx.stroke();

                // テキスト描画
                ctx.save();
                ctx.translate(300, 300);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 30px Inter";
                ctx.fillText(item, 280, 10);
                ctx.restore();
            });
        }

        function addItem() {
            const input = document.getElementById('itemInput');
            if (input.value.trim() !== "") {
                items.push(input.value.trim());
                input.value = "";
                updateUI();
            }
        }

        function deleteItem(index) {
            if (items.length > 2) {
                items.splice(index, 1);
                updateUI();
            } else {
                alert("項目は最低2つ必要です。");
            }
        }

        function updateUI() {
            const list = document.getElementById('itemList');
            list.innerHTML = "";
            items.forEach((item, i) => {
                list.innerHTML += `<span class="item-tag">${item} <span class="delete-tag" onclick="deleteItem(${i})">×</span></span>`;
            });
            drawWheel();
        }

        function spin() {
            const btn = document.getElementById('spinButton');
            const display = document.getElementById('result-display');
            btn.disabled = true;
            display.innerText = "抽選中...";

            // 5〜10回転のランダムな回転角を計算
            const extraSpins = 5 + Math.random() * 5;
            const spinAngle = extraSpins * 2 * Math.PI;
            currentRotation += spinAngle;

            // アニメーション実行
            canvas.style.transform = `rotate(${currentRotation}rad)`;

            setTimeout(() => {
                btn.disabled = false;
                
                // 【修正】現在の合計回転角から、0〜2πの範囲の角度を算出
                const actualRotation = currentRotation % (2 * Math.PI);
                const arcSize = (2 * Math.PI) / items.length;
                
                // 針が真上（-90度 = 1.5π）を指しているため、時計回りの回転を考慮して計算
                let winningIndex = Math.floor((3.5 * Math.PI - actualRotation) / arcSize) % items.length;

                display.innerText = `結果: ${items[winningIndex]} 🎉`;
            }, 4000);
        }

        // 初期描画
        updateUI();
    </script>
</body>
</html>
